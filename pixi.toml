[workspace]
name = "monogs"
version = "0.1.0"
description = "Pixi environment for the MonoGS project"
channels = ["nvidia", "conda-forge"]
platforms = ["linux-64"]

[activation.env]
DISPLAY = ":0"

[dependencies]
python = "3.10.*"
pip = "*"
setuptools = "*"
wheel = "*"
ninja = "*"
git = "*"
numpy = "<2"
pyyaml = "*"
matplotlib = "<4"
pillow = "<11"
plyfile = "==0.8.1"
tqdm = "*"
ruff = "*"
cuda-nvcc = { version = "13.0.*", channel = "nvidia" }
cuda-toolkit = { version = "13.0.*", channel = "nvidia" }

[pypi-options]
index-strategy = "unsafe-best-match"
extra-index-urls = ["https://download.pytorch.org/whl/cu130"]

[pypi-dependencies]
torch = "==2.9.1"
torchvision = "==0.24.1"
torchaudio = "==2.9.1"
opencv-python = "==4.8.1.78"
munch = "==4.0.0"
trimesh = "==3.23.5"
evo = "==1.11.0"
open3d-cpu = "==0.18.0"
torchmetrics = "==0.11.4"
imgviz = "==1.7.5"
pyopengl = "==3.1.7"
glfw = "==2.6.5"
pyglm = "==2.7.1"
wandb = "==0.15.12"
lpips = "==0.1.4"
rich = "==13.5.3"

[tasks]
setup = "git submodule update --init --recursive && python -m pip install --no-build-isolation submodules/simple-knn submodules/diff-gaussian-rasterization"
run = "python slam.py --config configs/mono/tum/fr3_office.yaml"
eval = "python slam.py --config configs/mono/tum/fr3_office.yaml --eval"
download-tum = "bash scripts/download_tum.sh"
download-replica = "bash scripts/download_replica.sh"
download-euroc = "bash scripts/download_euroc.sh"
